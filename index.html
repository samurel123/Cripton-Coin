<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Cripton Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:80px;
}

.card{
background:#1e293b;
width:420px;
margin:auto;
padding:40px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
background:#06b6d4;
color:white;
font-size:16px;
cursor:pointer;
}

input{
padding:10px;
margin:10px;
width:80%;
border-radius:6px;
border:none;
}

select{
padding:10px;
margin:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="card">

<h1>Cripton Wallet</h1>

<button onclick="connectWallet()">Connect Wallet</button>

<br>

<select id="network" onchange="switchNetwork()">

<option value="0x1">Ethereum</option>
<option value="0x89">Polygon</option>
<option value="0x38">BNB Chain</option>
<option value="0xa4b1">Arbitrum</option>
<option value="0xa">Optimism</option>

</select>

<p id="wallet">Wallet: not connected</p>

<p id="balance">Balance: 0</p>

<h3>Send Crypto</h3>

<input id="to" placeholder="Recipient Address">

<input id="amount" placeholder="Amount ETH">

<br>

<button onclick="sendCrypto()">Send</button>

</div>

<script>

let provider;
let signer;
let userAddress;

async function connectWallet(){

if(typeof window.ethereum === "undefined"){

alert("Install MetaMask");

return;

}

await window.ethereum.request({ method: 'eth_requestAccounts' });

provider = new ethers.providers.Web3Provider(window.ethereum);

signer = provider.getSigner();

userAddress = await signer.getAddress();

document.getElementById("wallet").innerHTML =
"Wallet: " + userAddress;

getBalance();

}

async function getBalance(){

const balance = await provider.getBalance(userAddress);

const eth = ethers.utils.formatEther(balance);

document.getElementById("balance").innerHTML =
"Balance: " + eth + " ETH";

}

async function sendCrypto(){

const to = document.getElementById("to").value;

const amount = document.getElementById("amount").value;

if(!signer){

alert("Connect wallet first");

return;

}

const tx = await signer.sendTransaction({

to: to,

value: ethers.utils.parseEther(amount)

});

alert("Transaction sent: " + tx.hash);

}

async function switchNetwork(){

const chainId = document.getElementById("network").value;

await window.ethereum.request({

method: "wallet_switchEthereumChain",

params: [{ chainId: chainId }]

});

}

</script>

</body>

</html>
