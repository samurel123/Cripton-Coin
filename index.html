
<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Cripton Wallet</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<script src="https://unpkg.com/thirdweb@latest/dist/browser.min.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:100px;
}

.card{
background:#1e293b;
width:420px;
margin:auto;
padding:40px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

button{
padding:12px 25px;
margin:10px;
font-size:16px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

input{
padding:10px;
width:80%;
margin:8px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<div class="card">

<h1>Cripton Wallet</h1>

<button onclick="connectWallet()">Connect Wallet</button>

<p id="wallet"></p>

<p id="balance"></p>

<hr>

<h3>Send Crypto</h3>

<input id="to" placeholder="Recipient Address">

<input id="amount" placeholder="Amount ETH">

<br>

<button onclick="send()">Send</button>

<hr>

<h3>Receive</h3>

<p>Share your wallet address to receive crypto</p>

</div>

<script>

const client = new thirdweb.ThirdwebClient({
clientId: "490ad1926c095ab8ebaf8142ab1a7584"
});

let provider;
let signer;
let userAddress;

async function connectWallet(){

if(!window.ethereum){

alert("Install MetaMask");

return;

}

await window.ethereum.request({ method: "eth_requestAccounts" });

provider = new ethers.providers.Web3Provider(window.ethereum);

signer = provider.getSigner();

userAddress = await signer.getAddress();

document.getElementById("wallet").innerText =
"Wallet: " + userAddress;

const balance = await provider.getBalance(userAddress);

document.getElementById("balance").innerText =
"Balance: " + ethers.utils.formatEther(balance) + " ETH";

}

async function send(){

const to = document.getElementById("to").value;

const amount = document.getElementById("amount").value;

if(!signer){

alert("Connect wallet first");

return;

}

const tx = await signer.sendTransaction({

to: to,

value: ethers.utils.parseEther(amount)

});

await tx.wait();

alert("Transaction sent");

}

</script>

</body>

</html>
